{% extends 'layout.html' %}

{% block content %}

{% for project in Proyectos %}

<h2>{{project.title}}</project></h2>
<p>{{project.description}}</p>
<img src="{{project.image.url }}"

    {% if project.url %}
    <a   href="{{project.url}}">{{project.url}}</a>

    {% endif %} 
{% endfor %} 

{% endblock %}
